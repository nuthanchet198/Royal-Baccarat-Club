<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Baccarat Club - Đẳng Cấp Thượng Lưu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .gold-text { color: #C5A059; }
        .gold-bg { background: #C5A059; }
        .luxury-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl mb-6 tracking-tight">ROYAL BACCARAT CLUB</h1>
        <p class="text-xl md:text-2xl text-gray-400 mb-10 max-w-2xl">11 năm kiến tạo giá trị đầu tư bền vững. Nơi hội tụ của sự tinh hoa.</p>
        <a href="#calculator" class="border border-[#C5A059] px-10 py-4 hover:bg-[#C5A059] transition duration-500 text-lg uppercase tracking-widest">Khám Phá Ngay</a>
    </section>

    <!-- CALCULATOR SECTION -->
    <section id="calculator" class="py-20 px-6 max-w-4xl mx-auto luxury-card rounded-2xl">
        <h2 class="text-4xl gold-text mb-10 text-center">Công Cụ Tính Lãi Kép</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <label class="block text-sm uppercase tracking-widest mb-2">Vốn đầu tư (VNĐ)</label>
                <input type="number" id="von" class="w-full bg-black border border-gray-700 p-4 text-xl focus:border-[#C5A059] outline-none" placeholder="10.000.000">
            </div>
            <div>
                <label class="block text-sm uppercase tracking-widest mb-2">Số ngày</label>
                <input type="number" id="ngay" class="w-full bg-black border border-gray-700 p-4 text-xl focus:border-[#C5A059] outline-none" placeholder="30">
            </div>
        </div>
        <button onclick="tinhLai()" class="w-full mt-8 gold-bg py-4 text-black font-bold text-xl uppercase hover:opacity-90 transition">Tính Lợi Nhuận</button>
        <div id="result" class="mt-10 text-center text-3xl font-bold gold-text"></div>
    </section>

    <!-- FOOTER / CTA -->
    <section class="py-20 text-center">
        <a href="https://t.me/your_telegram_link" class="inline-block bg-white text-black px-12 py-4 text-lg font-bold rounded-full hover:bg-gray-200 transition">LIÊN HỆ TELEGRAM</a>
    </section>

    <script>
        function tinhLai() {
            let v = parseFloat(document.getElementById('von').value);
            let n = parseInt(document.getElementById('ngay').value);
            if(!v || !n) return alert("Vui lòng nhập đầy đủ");
            let k = v * Math.pow(1.4, n);
            document.getElementById('result').innerText = "TỔNG TÀI SẢN: " + k.toLocaleString('vi-VN', {style: 'currency', currency: 'VND'});
        }
    </script>
</body>
</html>
